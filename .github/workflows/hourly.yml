name: Hourly Reports Automation

on:
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_MAP: ${{ secrets.TELEGRAM_CHAT_MAP }}
      OYO_PROPERTIES: ${{ secrets.OYO_PROPERTIES }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Capture Start Time
        run: |
          echo "RUN_START=$(date +%s)" >> $GITHUB_ENV

      - name: Run hourly script
        run: python hourly.py

      - name: Print Workflow Usage Summary
        if: always()
        run: |
          RUN_END=$(date +%s)
          RUNTIME=$((RUN_END - RUN_START))

          echo ""
          echo "========================================"
          echo "WORKFLOW USAGE SUMMARY"
          echo "========================================"
          echo "Workflow Name  : Hourly Reports Automation"
          echo "Run Date       : $(TZ=Asia/Kolkata date '+%Y-%m-%d')"
          echo "Run Time IST   : $(TZ=Asia/Kolkata date '+%d-%m-%Y %I:%M:%S %p')"
          echo "Start Epoch    : $RUN_START"
          echo "End Epoch      : $RUN_END"
          echo "Runtime Sec    : $RUNTIME"
          echo "========================================"
