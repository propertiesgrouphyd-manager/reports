name: Incremental1 Reports Automation

on:
  workflow_dispatch:   # manual run button
  schedule:
    - cron: "30 0 * * *"   # runs daily (IST morning ≈ 6:00)

jobs:
  run:
    runs-on: ubuntu-latest

    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_MAP: ${{ secrets.TELEGRAM_CHAT_MAP }}
      OYO_PROPERTIES: ${{ secrets.OYO_PROPERTIES }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run report script
        run: |
          python incremental1.py

      - name: Commit updated Excel report
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git add *.xlsx

          git diff --cached --quiet || git commit -m "Auto update collection report"

          git push
