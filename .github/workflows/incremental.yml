name: Incremental Automation

on:
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_MAP: ${{ secrets.TELEGRAM_CHAT_MAP }}
      OYO_PROPERTIES: ${{ secrets.OYO_PROPERTIES }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true   # 🔥 REQUIRED for push

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run report script
        run: |
          python incremental.py

      # 🔥 NEW: Commit & Push Excel to repo
      - name: Commit and push Excel report
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add *.xlsx

          # commit only if changes exist
          git diff --cached --quiet || git commit -m "📊 Auto update Excel report"

          git push

      - name: Upload Excel reports
        uses: actions/upload-artifact@v4
        with:
          name: reports
          path: "*.xlsx"
