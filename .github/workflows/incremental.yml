name: Incremental Automation

on:
  workflow_dispatch:
  schedule:
    - cron: "30 0 * * *"   # runs daily (~6 AM IST)

jobs:
  run:
    runs-on: ubuntu-latest

    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_MAP: ${{ secrets.TELEGRAM_CHAT_MAP }}
      OYO_PROPERTIES: ${{ secrets.OYO_PROPERTIES }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run report script
        run: |
          python incremental.py

      - name: Commit updated Excel reports
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          # Pull latest changes to avoid push conflicts
          git pull --rebase origin main

          # Add only Excel reports
          git add *.xlsx

          # Commit only if there are changes
          git diff --cached --quiet || git commit -m "Auto update reports"

          # Push back to repository
          git push origin main
